/* ─── Firebase helpers ──────────────────────────────────────────────── */
function fbRef(path)          { return window._fb.ref(window._fb.db, path); }
function fbSet(path, val)     { return window._fb.set(fbRef(path), val); }
function fbUpdate(path, val)  { return window._fb.update(fbRef(path), val); }
function fbListen(path, cb)   { return window._fb.onValue(fbRef(path), snap => cb(snap.val())); }

/* ─── Merge Firebase overrides into base plan ───────────────────────── */
function formatTime(t) {
  if (!t) return null;
  if (isNaN(t)) return String(t);
  const s = parseInt(t);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h + ":" + String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

function autoFormatTime(raw) {
  // Strip everything except digits
  const digits = raw.replace(/\D/g, "").slice(0, 6);
  if (digits.length <= 2) return digits;
  if (digits.length <= 4) return digits.slice(0,2) + ":" + digits.slice(2);
  return digits.slice(0,2) + ":" + digits.slice(2,4) + ":" + digits.slice(4);
}

function mergeRuns(fbData) {
  return BASE_PLAN.map((r, i) => ({
    ...r, id: i,
    completed: fbData?.[i]?.completed ?? r.completed,
    notes:     fbData?.[i]?.notes     ?? r.notes,
  }));
}

/* ─── Progress Ring ─────────────────────────────────────────────────── */
function ProgressRing({ percent, size=80, stroke=8, color="#e8b04b" }) {
  const r = (size - stroke) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e5e5" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ-(percent/100)*circ}
        style={{transition:"stroke-dashoffset 0.8s ease"}} strokeLinecap="round"/>
    </svg>
  );
}

/* ─── AI Insights ────────────────────────────────────────────────────── */
function AIInsights({ runs }) {
  const [insight, setInsight] = useState("");
  const [loading, setLoading] = useState(false);
  const [aiTab,   setAiTab]   = useState("training");
  const daysLeft  = getDaysUntilRace();
  const done      = runs.filter(r => r.completed);
  const totalKm   = done.reduce((s,r) => s + r.distance, 0);

  const getInsight = useCallback(async (topic) => {
    setLoading(true); setAiTab(topic);
    const prompts = {
      training: `You are an expert marathon running coach. The athlete is training for the Milton Keynes Marathon on 4th May 2026. There are ${daysLeft} days until race day. They have completed ${done.length} training sessions totalling ${totalKm.toFixed(1)}km. Goal: sub 5 hours (pace ~6:30/km). Give a specific, motivating, practical training insight for today in 3–4 sentences. Be direct and personal.`,
      nutrition: `You are a sports nutritionist specialising in endurance running. An athlete is ${daysLeft} days from the Milton Keynes Marathon (4th May 2026). Goal: sub 5 hours. Give specific, practical nutrition advice for this phase — foods, quantities, timing — in 3–4 sentences.`,
      recovery:  `You are an elite marathon coach. The athlete has ${daysLeft} days until their marathon. Give specific recovery advice for this stage — what to prioritise, what to avoid, practical tips. 3–4 sentences, actionable.`,
    };
    try {
      const res  = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{role:"user", content:prompts[topic]}] }),
      });
      const data = await res.json();
      setInsight(data.content?.[0]?.text || "Could not load insight.");
    } catch { setInsight("Could not connect to AI coach. Check your connection and try again."); }
    setLoading(false);
  }, [daysLeft, done.length, totalKm]);

  useEffect(() => { getInsight("training"); }, []);

  return (
    <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",borderRadius:16,padding:28,color:"white",marginBottom:28}}>

          <p style={{margin:0,fontSize:12,opacity:0.45,fontFamily:"monospace"}}>Powered by Claude · Updates on demand</p>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[{key:"training",label:"🏃 Training"},{key:"nutrition",label:"🥗 Nutrition"},{key:"recovery",label:"😴 Recovery"}].map(t => (
          <button key={t.key} onClick={() => getInsight(t.key)} style={{
            padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",
            background:aiTab===t.key?"#e8b04b":"rgba(255,255,255,0.1)",
            color:aiTab===t.key?"#1a1a2e":"white",transition:"all 0.2s",

        ))}

}

/* ─── Main App ───────────────────────────────────────────────────────── */
function App() {
  const [fbReady,     setFbReady]     = useState(!!window._fb);
  const [syncStatus,  setSyncStatus]  = useState("loading"); // loading | online | offline
  const [runs,        setRuns]        = useState(() => mergeRuns(null));
  const [activeTab,   setActiveTab]   = useState("schedule");
  const [selectedRun, setSelectedRun] = useState(null);
  const [noteInput,   setNoteInput]   = useState("");
  const [activities,  setActivities]  = useState([]);
  const [actForm,     setActForm]     = useState({date:"",distance:"",time:"",type:"Easy Run"});
  const [toast,       setToast]       = useState("");
  const ignoreNextRef = useRef(false);

  // Wait for Firebase module to load
  useEffect(() => {
    if (window._fb) { setFbReady(true); return; }
    const h = () => setFbReady(true);
    window.addEventListener("firebase-ready", h);
    return () => window.removeEventListener("firebase-ready", h);
  }, []);

  // Subscribe to Firebase — runs
  useEffect(() => {
    if (!fbReady) return;
    setSyncStatus("loading");
    const unsub = fbListen("runs", (data) => {
      setSyncStatus("online");
      if (ignoreNextRef.current) { ignoreNextRef.current = false; return; }
      setRuns(mergeRuns(data));
    });
    return unsub;
  }, [fbReady]);

  // Subscribe to Firebase — activities
  useEffect(() => {
    if (!fbReady) return;
    const unsub = fbListen("activities", (data) => {
      setActivities(data ? Object.values(data) : []);
    });
    return unsub;
  }, [fbReady]);

  // Handle offline
  useEffect(() => {
    const go  = () => setSyncStatus("online");
    const off = () => setSyncStatus("offline");
    window.addEventListener("online",  go);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", go); window.removeEventListener("offline", off); };
  }, []);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2000); }

  async function toggleComplete(id) {
    const run     = runs.find(r => r.id === id);
    const newVal  = !run.completed;
    // Optimistic update
    setRuns(prev => prev.map(r => r.id===id ? {...r, completed:newVal} : r));
    ignoreNextRef.current = true;
    try {
      await fbUpdate(`runs/${id}`, { completed: newVal, notes: run.notes });
      showToast(newVal ? "✓ Run marked complete — synced!" : "Run unmarked — synced");
    } catch {
      setRuns(prev => prev.map(r => r.id===id ? {...r, completed:!newVal} : r)); // rollback
      showToast("⚠️ Sync failed — check connection");
    }
  }

  function openNote(run) { setSelectedRun(run); setNoteInput(run.notes||""); }

  async function saveNote() {
    if (!selectedRun) return;
    const id = selectedRun.id;
    setRuns(prev => prev.map(r => r.id===id ? {...r, notes:noteInput} : r));
    setSelectedRun(null);
    ignoreNextRef.current = true;
    try {
      await fbUpdate(`runs/${id}`, { completed: selectedRun.completed, notes: noteInput });
      showToast("📝 Note saved — synced!");
    } catch { showToast("⚠️ Note saved locally but sync failed"); }
  }

  async function addActivity() {
    if (!actForm.date || !actForm.distance) return;
    const key  = `act_${Date.now()}`;
    const item = { ...actForm, key };
    setActivities(prev => [...prev, item]);
    setActForm({date:"",distance:"",time:"",type:"Easy Run"});
    try {
      await fbSet(`activities/${key}`, item);
      showToast("🏃 Activity logged — synced!");
    } catch { showToast("⚠️ Activity saved locally but sync failed"); }
  }

  async function deleteActivity(key) {
    setActivities(prev => prev.filter(a => a.key !== key));
    try { await fbSet(`activities/${key}`, null); } catch {}
  }

  // Derived stats
  const daysLeft    = getDaysUntilRace();
  const done        = runs.filter(r => r.completed);
  const totalKm     = done.reduce((s,r) => s+r.distance, 0);
  const plannedKm   = runs.reduce((s,r) => s+r.distance, 0);
  const progress    = Math.round((done.length / runs.length) * 100);
  const totalActKm  = activities.reduce((s,a) => s+parseFloat(a.distance||0), 0);
  const combinedKm  = totalActKm + totalKm;

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const currentWeek = (() => {
    for (const r of runs) {
      const d = new Date(r.date), diff = (d - todayD)/86400000;
      if (diff >= -6 && diff <= 6) return r.week;
    }
    return null;
  })();

  const weekGroups = runs.reduce((acc,r) => {
    if (!acc[r.week]) acc[r.week] = [];
    acc[r.week].push(r); return acc;
  }, {});

  const syncLabel = { loading:"Connecting…", online:"Synced across all devices", offline:"Offline — changes saved locally" };
  const syncColor = { loading:"#60a5fa", online:"#22c55e", offline:"#f59e0b" };

  if (!fbReady) return null; // show the HTML loading screen

  return (
    <div style={{minHeight:"100vh",background:"#f7f4ef"}}>

      {/* Toast */}
      <div style={{
        position:"fixed",bottom:24,right:24,zIndex:9999,
        background:"#1a1a2e",color:"white",padding:"12px 20px",borderRadius:12,
        fontSize:13,fontWeight:600,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",
        transform:toast?"translateY(0)":"translateY(80px)",
        opacity:toast?1:0,transition:"all 0.3s ease",pointerEvents:"none",
      }}>{toast}</div>

      {/* Header */}
      <div className="header-pad" style={{
        background:"linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%)",
        color:"white",padding:"40px 32px 32px",position:"relative",overflow:"hidden",
      }}>
        <div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"rgba(232,176,75,0.1)"}}/>
        <div style={{position:"absolute",bottom:-60,right:80,width:140,height:140,borderRadius:"50%",background:"rgba(232,176,75,0.06)"}}/>
        <div style={{maxWidth:860,margin:"0 auto",position:"relative"}}>
          {/* Sync status badge */}
          <div style={{display:"inline-flex",alignItems:"center",background:"rgba(255,255,255,0.08)",borderRadius:20,padding:"4px 12px",marginBottom:12,fontSize:12}}>
            <span className={`sync-dot ${syncStatus}`}/>
            <span style={{opacity:0.7}}>{syncLabel[syncStatus]}</span>
          </div>
          <p style={{margin:"0 0 4px",fontSize:11,letterSpacing:3,textTransform:"uppercase",opacity:0.45,fontWeight:500}}>Marathon Training Dashboard</p>
          <h1 style={{margin:"0 0 4px",fontFamily:"'Playfair Display',serif",fontSize:"clamp(24px,5vw,38px)",fontWeight:900,lineHeight:1.1}}>
            Milton Keynes Marathon
          </h1>
          <p style={{margin:"0 0 28px",opacity:0.55,fontSize:14}}>4th May 2026 · Target: Sub 5:00:00 · Pace: 6:30/km</p>
          <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {[
              {label:"Days to Race", value:daysLeft,                        icon:"📅",color:"#e8b04b"},
              {label:"Sessions Done",value:`${done.length}/${runs.length}`, icon:"✅",color:"#4dd0e1"},
              {label:"KM Logged",    value:`${combinedKm.toFixed(1)}km`,    icon:"🏃",color:"#81c784"},
              {label:"Plan Progress",value:`${progress}%`,                  icon:"📈",color:"#f48fb1"},
            ].map(s => (
              <div key={s.label} style={{background:"rgba(255,255,255,0.08)",borderRadius:12,padding:"14px 16px",backdropFilter:"blur(10px)"}}>
                <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
                <div style={{fontSize:"clamp(20px,3.5vw,28px)",fontWeight:700,color:s.color,fontFamily:"'Playfair Display',serif",lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:11,opacity:0.55,marginTop:4}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{background:"#1a1a2e",padding:"10px 32px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",gap:12}}>
          <span style={{color:"rgba(255,255,255,0.4)",fontSize:11,minWidth:100,whiteSpace:"nowrap"}}>Overall Progress</span>
          <div style={{flex:1,height:5,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${progress}%`,height:"100%",background:"linear-gradient(90deg,#e8b04b,#f48fb1)",borderRadius:3,transition:"width 1s ease"}}/>
          </div>
          <span style={{color:"#e8b04b",fontSize:12,fontWeight:600,minWidth:32}}>{progress}%</span>
        </div>
      </div>

      {/* Tabs */}
      <div className="content-pad" style={{maxWidth:860,margin:"0 auto",padding:"0 32px"}}>
        <div className="tabs-row" style={{display:"flex",gap:2,borderBottom:"2px solid #e5e0d8",marginTop:28,marginBottom:28,overflowX:"auto"}}>
          {[
            {key:"schedule",  emoji:"📋", label:"Schedule",    short:"Schedule"},
            {key:"insights",  emoji:"🤖", label:"AI Coach",    short:"AI Coach"},
            {key:"activities",emoji:"🟠", label:"Activity Log", short:"Log"},
            {key:"tips",      emoji:"💡", label:"Tips & Nutrition", short:"Tips"},
          ].map(t => (
            <button key={t.key} className="tab-btn" onClick={() => setActiveTab(t.key)} style={{
              padding:"10px 12px",border:"none",background:"transparent",cursor:"pointer",
              fontSize:13,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap",
              color:activeTab===t.key?"#1a1a2e":"#999",
              borderBottom:activeTab===t.key?"2px solid #1a1a2e":"2px solid transparent",
              marginBottom:-2,transition:"all 0.2s",borderRadius:"8px 8px 0 0",
            }}>
              <span className="tab-full">{t.emoji} {t.label}</span>
              <span className="tab-short" style={{display:"none",textAlign:"center",fontSize:11,lineHeight:1.4}}>{t.emoji}<br/>{t.short}</span>
            </button>
          ))}
        </div>

        {/* ═══ SCHEDULE ═══ */}
        {activeTab==="schedule" && (
          <div className="fade-in">
            {Object.entries(weekGroups).map(([week, wRuns]) => {
              const wNum = parseInt(week);
              const isCurrent = wNum === currentWeek;
              const wDone = wRuns.filter(r => r.completed).length;
              return (
                <div key={week} style={{marginBottom:28}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <h3 style={{margin:0,fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:isCurrent?"#e8b04b":"#aaa",whiteSpace:"nowrap"}}>
                      {wNum===8?"🏁 Race Week":`Week ${week}`}
                      {isCurrent && <span style={{marginLeft:8,background:"#e8b04b",color:"#1a1a2e",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700,letterSpacing:0}}>THIS WEEK</span>}
                    </h3>
                    <div style={{flex:1,height:1,background:"#e5e0d8"}}/>
                    <span style={{fontSize:11,color:"#aaa",whiteSpace:"nowrap"}}>{wDone}/{wRuns.length} done</span>
                  </div>
                  {wRuns.map(run => {
                    const c = TYPE_COLORS[run.type] || {bg:"#f5f5f5",text:"#333",border:"#ccc"};
                    const isPast = new Date(run.date) < todayD && run.type!=="RACE DAY 🏁";
                    return (
                      <div key={run.id} className="run-card" style={{
                        display:"grid",gridTemplateColumns:"56px 1fr",gap:14,
                        background:run.completed?"#f0fdf4":"white",
                        border:`1px solid ${run.completed?"#bbf7d0":"#e5e0d8"}`,
                        borderLeft:`4px solid ${c.border}`,
                        borderRadius:12,padding:"14px 16px",marginBottom:10,
                        opacity:isPast&&!run.completed?0.65:1,
                      }}>
                        <div style={{textAlign:"center",paddingTop:2}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#aaa"}}>{run.day}</div>
                          <div style={{fontSize:11,color:"#bbb",marginTop:2}}>{run.date.slice(5)}</div>
                          {run.completed && <div style={{fontSize:16,marginTop:4}}>✅</div>}
                        </div>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                            <span style={{background:c.bg,color:c.text,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{run.type}</span>
                            <span style={{fontWeight:700,fontSize:15,color:"#1a1a2e"}}>{run.distance}km</span>
                            <span style={{fontSize:12,color:"#888"}}>· {run.pace}/km</span>
                          </div>
                          <p style={{margin:"0 0 8px",fontSize:13,color:"#555",lineHeight:1.5}}>{run.description}</p>
                          {run.notes && <p style={{margin:"0 0 8px",fontSize:12,color:"#777",fontStyle:"italic",background:"#f9f6f2",padding:"6px 10px",borderRadius:6}}>📝 {run.notes}</p>}
                          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                            <button onClick={() => toggleComplete(run.id)} style={{
                              padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",
                              fontSize:12,fontWeight:600,fontFamily:"inherit",
                              background:run.completed?"#22c55e":"#1a1a2e",color:"white",transition:"all 0.2s",
                            }}>{run.completed?"✓ Completed":"Mark Done"}</button>
                            <button onClick={() => openNote(run)} style={{
                              padding:"6px 12px",borderRadius:20,border:"1px solid #e5e0d8",
                              cursor:"pointer",fontSize:12,background:"transparent",color:"#888",fontFamily:"inherit",
                            }}>{run.notes?"Edit Note":"+ Note"}</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ AI COACH ═══ */}
        {activeTab==="insights" && (
          <div className="fade-in">
            <AIInsights runs={runs}/>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={{background:"white",borderRadius:16,padding:24,border:"1px solid #e5e0d8"}}>
                <h4 style={{margin:"0 0 16px",fontFamily:"'Playfair Display',serif",fontSize:18}}>📊 Your Progress</h4>
                <div style={{display:"flex",alignItems:"center",gap:20}}>
                  <div style={{position:"relative",flexShrink:0}}>
                    <ProgressRing percent={progress}/>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{progress}%</div>
                  </div>
                  <div style={{fontSize:13,lineHeight:2.1,color:"#555"}}>
                    <div>Sessions: <strong>{done.length}/{runs.length}</strong></div>
                    <div>KM done: <strong>{combinedKm.toFixed(1)}km</strong></div>
                    <div>KM planned: <strong>{plannedKm.toFixed(1)}km</strong></div>
                    <div>Days left: <strong>{daysLeft}</strong></div>
                  </div>
                </div>
              </div>
              <div style={{background:"white",borderRadius:16,padding:24,border:"1px solid #e5e0d8"}}>
                <h4 style={{margin:"0 0 16px",fontFamily:"'Playfair Display',serif",fontSize:18}}>🎯 Race Target</h4>
                <div style={{fontSize:"clamp(28px,5vw,36px)",fontWeight:900,fontFamily:"'Playfair Display',serif",color:"#1a1a2e",lineHeight:1}}>Sub 5:00:00</div>
                <div style={{fontSize:13,color:"#888",margin:"6px 0 10px"}}>Your goal finish time</div>
                <div style={{fontSize:13,color:"#22c55e",fontWeight:600,marginBottom:6}}>✓ Run at 6:30/km to finish in ~4:34 — 25 mins inside target</div>
                <div style={{fontSize:12,color:"#aaa"}}>Race date: Mon 4th May 2026</div>
              </div>
            </div>
          </div>
        )}

        {/* ═══ ACTIVITY LOG ═══ */}
        {activeTab==="activities" && (
          <div className="fade-in">
            <div style={{background:"linear-gradient(135deg,#FC4C02,#e03800)",borderRadius:16,padding:24,color:"white",marginBottom:20}}>
              <h3 style={{margin:"0 0 8px",fontFamily:"'Playfair Display',serif",fontSize:20}}>🟠 Activity Log</h3>
              <p style={{margin:0,opacity:0.85,fontSize:13,lineHeight:1.6}}>
                Log your runs here — they sync instantly across all your devices via Firebase. Total km feeds into your progress stats.
              </p>
            </div>
            <div style={{background:"white",borderRadius:16,padding:24,border:"1px solid #e5e0d8",marginBottom:16}}>
              <h4 style={{margin:"0 0 16px",fontFamily:"'Playfair Display',serif"}}>Log a Run</h4>
              <div className="strava-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
                {[
                  {label:"Date",           el:<input type="date" value={actForm.date} onChange={e=>setActForm(p=>({...p,date:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:"1px solid #e5e0d8",borderRadius:8,fontFamily:"inherit",fontSize:13}}/>},
                  {label:"Distance (km)",  el:<input type="number" step="0.1" placeholder="e.g. 10.5" value={actForm.distance} onChange={e=>setActForm(p=>({...p,distance:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:"1px solid #e5e0d8",borderRadius:8,fontFamily:"inherit",fontSize:13}}/>},
                  {label:"Duration",el:<input type="text" placeholder="hhmmss" inputMode="numeric" value={actForm.time} onChange={e=>setActForm(p=>({...p,time:autoFormatTime(e.target.value)}))} style={{width:"100%",padding:"8px 10px",border:"1px solid #e5e0d8",borderRadius:8,fontFamily:"inherit",fontSize:13,letterSpacing:"0.05em"}}/>},
                  {label:"Type",           el:<select value={actForm.type} onChange={e=>setActForm(p=>({...p,type:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:"1px solid #e5e0d8",borderRadius:8,fontFamily:"inherit",fontSize:13}}>
                    <option>Easy Run</option><option>Long Run</option><option>Tempo Run</option><option>Intervals</option><option>Marathon Pace</option><option>Race</option><option>Recovery</option>
                  </select>},
                ].map(f => (
                  <div key={f.label}>
                    <label style={{fontSize:11,color:"#888",display:"block",marginBottom:4}}>{f.label}</label>
                    {f.el}
                  </div>
                ))}
                <button onClick={addActivity} style={{padding:"9px 16px",background:"#FC4C02",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Add</button>
              </div>
            </div>
            <div style={{background:"white",borderRadius:16,padding:24,border:"1px solid #e5e0d8"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center"}}>
                <h4 style={{margin:0,fontFamily:"'Playfair Display',serif"}}>Activity History</h4>
                <span style={{fontSize:13,color:"#888"}}>Total: <strong>{totalActKm.toFixed(1)}km</strong></span>
              </div>
              {activities.length===0 && <p style={{color:"#aaa",fontSize:13,textAlign:"center",padding:"20px 0"}}>No activities logged yet. Add your first above!</p>}
              {[...activities].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((a) => (
                <div key={a.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #f0ede8"}}>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <div style={{width:36,height:36,background:"#fff3e0",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🏃</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{a.type}</div>
                      <div style={{fontSize:12,color:"#aaa"}}>{a.date}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:700,color:"#FC4C02",fontSize:15}}>{a.distance}km</div>
                      {a.time && <div style={{fontSize:12,color:"#aaa"}}>{formatTime(a.time)}</div>}
                    </div>
                    <button onClick={() => deleteActivity(a.key)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:18,padding:"4px 6px",lineHeight:1}} title="Delete">×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ═══ TIPS ═══ */}
        {activeTab==="tips" && (
          <div className="fade-in">
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:20}}>🥗 Nutrition Plan</h3>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:32}}>
              {NUTRITION_TIPS.map((t,i) => (
                <div key={i} style={{background:"white",border:"1px solid #e5e0d8",borderRadius:14,padding:20}}>
                  <div style={{fontSize:28,marginBottom:8}}>{t.icon}</div>
                  <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e",marginBottom:6}}>{t.phase}</div>
                  <p style={{margin:0,fontSize:13,color:"#555",lineHeight:1.65}}>{t.tip}</p>
                </div>
              ))}
            </div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:20}}>💡 Training Tips</h3>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:32}}>
              {TRAINING_TIPS.map((t,i) => (
                <div key={i} style={{background:"white",border:"1px solid #e5e0d8",borderLeft:"4px solid #1a1a2e",borderRadius:14,padding:20}}>
                  <div style={{fontSize:28,marginBottom:8}}>{t.icon}</div>
                  <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e",marginBottom:6}}>{t.category}</div>
                  <p style={{margin:0,fontSize:13,color:"#555",lineHeight:1.65}}>{t.tip}</p>
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,#1a1a2e,#0f3460)",borderRadius:16,padding:28,color:"white",marginBottom:32}}>
              <h4 style={{margin:"0 0 16px",fontFamily:"'Playfair Display',serif",fontSize:20}}>📅 Race Week Countdown</h4>
              {[
                {label:"Mon 27 Apr", note:"Begin carb loading. 8–10g carbs/kg body weight."},
                {label:"Tue 28 Apr", note:"Final proper run (6km easy). Carb loading continues."},
                {label:"Wed 29 Apr", note:"Rest or gentle walk. Lay out race kit."},
                {label:"Thu 30 Apr", note:"Short shake-out with 3km at race pace. Pin race number."},
                {label:"Fri 1 May",  note:"Full rest day. Eat well, hydrate, sleep early."},
                {label:"Sat 2 May",  note:"3km shake-out jog. Pasta dinner. Bed by 10pm."},
                {label:"Sun 3 May",  note:"Rest completely. Lay out everything. Visualise your race."},
                {label:"Mon 4 May 🏁", note:"RACE DAY. Breakfast 3hrs before. Trust your training!"},
              ].map((d,i) => (
                <div key={i} style={{display:"flex",gap:16,padding:"10px 0",borderBottom:i<7?"1px solid rgba(255,255,255,0.1)":"none",flexWrap:"wrap"}}>
                  <div style={{minWidth:90,fontSize:13,fontWeight:600,color:"#e8b04b"}}>{d.label}</div>
                  <div style={{fontSize:13,opacity:0.8,flex:1}}>{d.note}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{height:60}}/>
      </div>

      {/* Note Modal */}
      {selectedRun && (
        <div onClick={e => e.target===e.currentTarget && setSelectedRun(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
          <div style={{background:"white",borderRadius:20,padding:28,width:440,maxWidth:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",animation:"slideIn 0.25s ease"}}>
            <h3 style={{margin:"0 0 4px",fontFamily:"'Playfair Display',serif",fontSize:20}}>Run Note</h3>
            <p style={{margin:"0 0 16px",fontSize:13,color:"#888"}}>{selectedRun.type} · {selectedRun.date} · {selectedRun.distance}km</p>
            <textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)}
              placeholder="How did it go? Any niggles? How did you feel?"
              style={{width:"100%",height:110,padding:12,border:"1px solid #e5e0d8",borderRadius:10,fontFamily:"inherit",fontSize:14,resize:"vertical"}}
              autoFocus/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={saveNote} style={{flex:1,padding:12,background:"#1a1a2e",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:14}}>Save &amp; Sync</button>
              <button onClick={()=>setSelectedRun(null)} style={{padding:12,background:"#f5f5f5",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Wait for Firebase to be ready before mounting
function Root() {
  const [ready, setReady] = useState(!!window._fb);
  useEffect(() => {
    if (window._fb) return;
    const h = () => setReady(true);
    window.addEventListener("firebase-ready", h);
    return () => window.removeEventListener("firebase-ready", h);
  }, []);
  if (!ready) return null;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
